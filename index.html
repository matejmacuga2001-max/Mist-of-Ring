<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Statistiky Cechu</title>
    <script src="https://sftools.mar21.eu/script.js"></script>
</head>
<body style="background-color: #111; color: white; font-family: sans-serif;">

    <script type="text/sftool">
        # --- NASTAVENÍ ---
        statistics off
        difference on
        lined on
        theme dark

        # Barvy pro levely
        table set maxLevel as max(map(this, Level))
        table set minLevel as min(map(this, Level))

        # --- TABULKA ---
        category Character
        alias <b>Postava</b>
        
        header Name
          width @normal

        header Level
          alias <b>Level</b>
          expc gradient({minLevel: '28D28C', maxLevel: '2A9D44'}, this)
        
        category Fortress
        alias <b>Pevnost</b>

        header Gem Mine
          alias <b>Důl</b>
          width 70
          # Pokud je důl pod 10, svítí červeně
          color below 10 @red
          expc gradient({'0': 'F1C40F', '20': 'F39C12'}, this)
    </script>
<script>
        // Funkce pro načtení dat
        async function loadStats() {
            try {
                const response = await fetch('data.csv');
                if (!response.ok) throw new Error('Soubor data.csv nenalezen');
                
                const data = await response.text();
                
                // Počkáme sekundu, aby se motor SFTools stihl v prohlížeči "probudit"
                setTimeout(() => {
                    window.dispatchEvent(new CustomEvent('sftools-run', { detail: data }));
                    console.log('Data odeslána do tabulky');
                }, 1000);
                
            } catch (err) {
                console.error('Chyba:', err);
                document.body.innerHTML += '<p style="color:red">Chyba při načítání dat: ' + err.message + '</p>';
            }
        }

        window.addEventListener('load', loadStats);
    </script>
   w CustomEvent('sftools-run', { detail: d })));
        });
    </script>
</body>
</html>
