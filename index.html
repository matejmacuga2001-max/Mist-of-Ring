<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Ring of Mist Stats</title>
    <script src="https://sftools.mar21.eu/script.js"></script>
</head>
<body style="background-color: #111; color: white; padding: 20px; font-family: sans-serif;">

    <div id="status">Zpracovávám data cechu...</div>

    <script type="text/sftool">
        statistics off
        theme dark
        
        category Character
        alias <b>Členové cechu</b>
        header Name
          alias <b>Jméno</b>
        header Level
          expc gradient({'0': 'white', '500': 'green'}, this)

        category Fortress
        alias <b>Pevnost</b>
        header Gem Mine
          alias <b>Důl</b>
          color below 10 @red
    </script>

    <script>
        window.addEventListener('load', async () => {
            const status = document.getElementById('status');
            try {
                const response = await fetch('data.csv');
                if (!response.ok) throw new Error('Soubor data.csv nenalezen.');
                
                let text = await response.text();
                
                // --- OPRAVA DAT ---
                // Odstraní prázdné znaky na začátku/konci a opraví případné chyby formátu
                text = text.trim(); 
                
                status.innerText = 'Vykresluji tabulku...';

                // Pošleme vyčištěná data do motoru
                setTimeout(() => {
                    window.dispatchEvent(new CustomEvent('sftools-run', { detail: text }));
                    setTimeout(() => { status.style.display = 'none'; }, 1000);
                }, 500);

            } catch (err) {
                status.innerHTML = '<b style="color:red">CHYBA: ' + err.message + '</b>';
            }
        });
    </script>
</body>
</html>
