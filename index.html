<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>S&F Stats</title>
    <script src="https://sftools.mar21.eu/script.js"></script>
</head>
<body style="background-color: #111; color: white; padding: 20px;">

    <div id="status">Načítám motor tabulky...</div>

    <script type="text/sftool">
        statistics off
        theme dark
        
        category Character
        alias <b>Členové cechu</b>
        header Name
          width @normal
        header Level
          expc gradient({'0': 'white', '500': 'green'}, this)

        category Fortress
        alias <b>Pevnost</b>
        header Gem Mine
          alias <b>Důl</b>
          color below 10 @red
    </script>

    <script>
        window.addEventListener('load', async () => {
            const status = document.getElementById('status');
            try {
                // Pokusíme se načíst data
                const response = await fetch('data.csv');
                if (!response.ok) throw new Error('Nemůžu najít soubor data.csv na GitHubu!');
                
                const csvData = await response.text();
                status.innerText = 'Data načtena, spouštím tabulku...';

                // Klíčový moment: Spuštění motoru
                setTimeout(() => {
                    window.dispatchEvent(new CustomEvent('sftools-run', { detail: csvData }));
                    status.style.display = 'none'; // Schová nápis, pokud to vyjde
                }, 500);

            } catch (err) {
                status.innerHTML = '<b style="color:red">CHYBA: ' + err.message + '</b><br>Ujisti se, že se soubor jmenuje přesně data.csv';
            }
        });
    </script>
</body>
</html>
